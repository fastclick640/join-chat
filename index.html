body{

  align-items:center;

/* BACKGROUND */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:url('https://i.ibb.co.com/LXgNVBC4/Whats-App-Image-2026-04-01-at-01-23-44.jpg') no-repeat center/cover;

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  backdrop-filter: blur(8px);
  z-index:-1;
}

/* CARD */
.card{
  background: rgba(0,0,0,0.55);
  padding:35px;
  border-radius:22px;
  text-align:center;
  max-width:340px;
  box-shadow:0 20px 70px rgba(0,0,0,0.7);

}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* LOADING TEXT */
.loader{
  font-size:13px;
  opacity:0.8;
  margin-bottom:15px;
}

.dots::after{
  content:'';
  animation:dots 1.5s infinite;
}

@keyframes dots{
  0%{content:'';}
  33%{content:'.';}
  66%{content:'..';}
  100%{content:'...';}
}

h1{

  margin-bottom:10px;

  border-radius:50px;
  color:white;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
  box-shadow:0 10px 30px rgba(37,211,102,0.4);
}

.btn:hover{
  transform:scale(1.05);
  box-shadow:0 15px 40px rgba(37,211,102,0.6);
}

.small{
  margin-top:12px;
  font-size:11px;
